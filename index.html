<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gujarati AI Robot 🤖</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Spline Viewer -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.81/build/spline-viewer.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    spline-viewer {
      width: 100%;
      height: 100vh;
      display: block;
    }

    .overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: gold;
      font-size: 22px;
      z-index: 10;
      cursor: pointer;
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: white;
      opacity: 0.7;
      font-size: 14px;
      z-index: 10;
    }
  </style>
</head>

<body>

  <div class="overlay" onclick="speakGujarati()">
    🤖 Click me to talk!
  </div>

  <div class="hint">
    Move mouse / click anywhere 🎧
  </div>

  <!-- Spline Robot -->
  <spline-viewer id="robot"
    url="https://prod.spline.design/PhZPB7qnG4ver6KO/scene.splinecode">
  </spline-viewer>

  <!-- Background Music -->
  <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b7f52.mp3" type="audio/mpeg">
  </audio>

  <!-- Click Sound -->
  <audio id="clickSound">
    <source src="https://cdn.pixabay.com/audio/2022/03/10/audio_c8c8a73467.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Start background music on first interaction
    document.body.addEventListener("click", () => {
      document.getElementById("bgMusic").play();
    }, { once: true });

    // Gujarati Speech Function
    function speakGujarati() {
      const text = "નમસ્તે! હું તમારો AI રોબોટ છું. તમારું સ્વાગત છે!";

      const speech = new SpeechSynthesisUtterance(text);
      speech.lang = "gu-IN";
      speech.rate = 1;
      speech.pitch = 1.1;

      speechSynthesis.speak(speech);

      // Play click sound
      document.getElementById("clickSound").play();
    }

    // Mouse move interaction (light talking effect)
    let lastMove = 0;
    document.addEventListener("mousemove", () => {
      const now = Date.now();

      if (now - lastMove > 4000) {
        lastMove = now;

        const speech = new SpeechSynthesisUtterance("હું તમને જોઈ રહ્યો છું 👀");
        speech.lang = "gu-IN";
        speech.rate = 1;

        speechSynthesis.speak(speech);
      }
    });

    // Random greeting on load
    window.onload = () => {
      setTimeout(() => {
        speakGujarati();
      }, 1500);
    };
  </script>

</body>
</html>
