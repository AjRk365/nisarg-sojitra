<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nisarg Sojitra - Math Expert 🚀</title>

  <!-- Spline Viewer -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.81/build/spline-viewer.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
      color: gold;
    }

    /* Spline Fullscreen Background */
    spline-viewer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* Center Text */
    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotateX(20deg);
      font-size: 42px;
      text-align: center;
      text-shadow: 0 0 20px gold;
      z-index: 2;
      animation: float 3s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translate(-50%, -50%) rotateX(20deg); }
      50% { transform: translate(-50%, -55%) rotateX(25deg); }
    }

    /* Infinity Symbol */
    .infinity {
      position: absolute;
      width: 200px;
      height: 100px;
      border: 5px solid gold;
      border-radius: 100px;
      animation: glow 2s infinite alternate;
      z-index: 2;
    }

    .infinity:before, .infinity:after {
      content: "";
      position: absolute;
      width: 100px;
      height: 100px;
      border: 5px solid gold;
      border-radius: 50%;
      top: -5px;
    }

    .infinity:before { left: -55px; }
    .infinity:after { right: -55px; }

    @keyframes glow {
      from { box-shadow: 0 0 10px gold; }
      to { box-shadow: 0 0 30px gold; }
    }

    /* Glitter */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: gold;
      border-radius: 50%;
      pointer-events: none;
      z-index: 3;
      animation: fade 1s linear forwards;
    }

    @keyframes fade {
      to {
        opacity: 0;
        transform: scale(2);
      }
    }

  </style>
</head>

<body>

  <!-- 🔥 Spline Background -->
  <spline-viewer url="PASTE_YOUR_SPLINE_URL_HERE"></spline-viewer>

  <!-- 💬 Main Text -->
  <div class="center">
    Hello Demon 😈<br>
    Nisarg Sojitra<br>
    <small>Math Expert 💡</small>
  </div>

  <!-- ♾️ Infinity -->
  <div class="infinity" style="top:20%; left:40%;"></div>

  <!-- ✨ Glitter Effect -->
  <script>
    document.addEventListener("mousemove", function(e) {
      let particle = document.createElement("div");
      particle.className = "particle";

      document.body.appendChild(particle);

      particle.style.left = e.pageX + "px";
      particle.style.top = e.pageY + "px";

      setTimeout(() => {
        particle.remove();
      }, 1000);
    });
  </script>

</body>
</html>
