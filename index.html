<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My 3D Website</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Spline Viewer Script -->
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.81/build/spline-viewer.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    spline-viewer {
      width: 100%;
      height: 100vh;
      display: block;
    }

    /* Optional overlay text */
    .overlay {
      position: absolute;
      top: 20px;
      left: 20px;
      color: gold;
      font-size: 24px;
      z-index: 10;
    }
  </style>
</head>

<body>

  <div class="overlay">✨ Welcome to My 3D World</div>

  <!-- Spline 3D Scene -->
  <spline-viewer url="https://prod.spline.design/PhZPB7qnG4ver6KO/scene.splinecode"></spline-viewer>

</body>
</html>
